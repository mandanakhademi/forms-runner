services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
      args:
        BUNDLE_WITHOUT: ""
    volumes:
      - ..:/workspace:cached
    command: sh -lc 'cd /workspace && bundle exec rails s -b 0.0.0.0 -p 3000'
    depends_on:
      - postgres
      - redis
    environment:
      RAILS_ENV: development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/forms_runner_development
      REDIS_URL: redis://redis:6379/0
      SETTINGS__GOVUK_ONE_LOGIN__PRIVATE_KEY: ""
      SECRET_KEY_BASE: "ca49e8c040430c7c3347f97eb5dee899eb90760811aa040c4037d0ca6ca3a4165e2e8d2a1b908fa858cfb7bafb477bfd8250c076a899f0f9c079d599747ce6b9"

  postgres:
    image: postgres:13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: forms_runner_development
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  bundle_cache:
  postgres_data:
  redis_data:
